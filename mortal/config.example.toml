# This is only an example. Most values are dummy placeholders just to match the
# types; they are often not optimal and must be tuned.

[control]
version = 4
online = false

state_file = '/workspace/mortal/built/models/mortal.pth'
best_state_file = '/workspace/mortal/built/models/best.pth'
tensorboard_dir = '/workspace/mortal/built/tensorboard'

device = 'cuda:0'
enable_cudnn_benchmark = false
enable_amp = false
enable_compile = false

batch_size = 64
opt_step_every = 1

save_every = 400
test_every = 20000
submit_every = 400


# using env `TRAIN_PLAY_PROFILE`
[train_play.default]
games = 800
log_dir = '/workspace/mortal/built/logs/train_play'
boltzmann_epsilon = 0.005
boltzmann_temp = 0.05
top_p = 1.0
repeats = 1

[test_play]
games = 3000
log_dir = '/workspace/mortal/built/logs/test_play'

[dataset]
globs = ['/workspace/mortal/built/dataset/**/*.json.gz']
file_index = '/workspace/mortal/built/models/file_index.pth'
file_batch_size = 15
reserve_ratio = 0.0
num_workers = 0
player_names_files = []
num_epochs = 1
enable_augmentation = false
augmented_first = false

[env]
gamma = 1
pts = [6.0, 4.0, 2.0, 0.0]

[resnet]
conv_channels = 192
num_blocks = 40

[cql]
min_q_weight = 5

[aux]
next_rank_weight = 0.2

[freeze_bn]
# `true` in online training
mortal = false

[optim]
eps = 1e-8
betas = [0.9, 0.999]
weight_decay = 0.1
max_grad_norm = 0

[optim.scheduler]
peak = 1e-4
final = 1e-4
warm_up_steps = 0
max_steps = 0

[baseline.train]


device = 'cuda:0'
enable_compile = false
state_file = '/workspace/mortal/built/models/mortal.pth'

[baseline.test]
device = 'cuda:0'
enable_compile = false
state_file = '/workspace/mortal/built/models/best.pth'

[online]
history_window = 50
enable_compile = false

[online.remote]
host = '127.0.0.1'
port = 5000

[online.server]
buffer_dir = '/workspace/mortal/built/online_server/buffer'
drain_dir = '/workspace/mortal/built/online_server/drain'
sample_reuse_rate = 0
sample_reuse_threshold = 0
capacity = 1600
force_sequential = false

[1v3]
seed_key = -1
games_per_iter = 4
iters = 1
log_dir = '/workspace/mortal/built/1v3'

[1v3.challenger]
device = 'cuda:0'
name = 'mortal'
state_file = '/workspace/mortal/built/models/mortal.pth'
stochastic_latent = false
enable_compile = false
enable_amp = true
enable_rule_based_agari_guard = true

[1v3.champion]
device = 'cuda:0'
name = 'baseline'
state_file = '/workspace/mortal/built/models/best.pth'
stochastic_latent = false
enable_compile = false
enable_amp = true
enable_rule_based_agari_guard = true

[1v3.akochan]
enabled = false
dir = '/workspace/mortal/built/models/akochan'
tactics = '/workspace/mortal/built/tactics.json'

[grp]
state_file = '/workspace/mortal/built/models/grp.pth'

[grp.network]
hidden_size = 64
num_layers = 2

[grp.control]
device = 'cuda:0'
enable_cudnn_benchmark = false
tensorboard_dir = '/workspace/mortal/built/tensorboard/grp_v2/log'

batch_size = 512
save_every = 2000
val_steps = 400

[grp.dataset]
train_globs = [
    '/workspace/mortal/built/dataset/2024/01/**/*.json.gz',
    '/workspace/mortal/built/dataset/2024/02/**/*.json.gz',
    '/workspace/mortal/built/dataset/2024/03/**/*.json.gz',
    '/workspace/mortal/built/dataset/2024/04/**/*.json.gz',
    '/workspace/mortal/built/dataset/2024/05/**/*.json.gz',
    '/workspace/mortal/built/dataset/2024/07/**/*.json.gz',
    '/workspace/mortal/built/dataset/2024/08/**/*.json.gz',
    '/workspace/mortal/built/dataset/2024/09/**/*.json.gz',
    '/workspace/mortal/built/dataset/2024/10/**/*.json.gz',
    '/workspace/mortal/built/dataset/2024/11/**/*.json.gz',
    # ...
]
val_globs = [
    '/workspace/mortal/built/dataset/2024/06/**/*.json.gz',
    '/workspace/mortal/built/dataset/2024/12/**/*.json.gz',
    # ...
]
file_index = '/workspace/mortal/built/models/grp_file_index.pth'
file_batch_size = 50

[grp.optim]
lr = 1e-5

[concepts]
is_gen_concepts = true
regression_models_dir = './built/concept_analysis/regression_models'
plots_dir = './built/concept_analysis/plots'
analysis_file = './built/concept_analysis/analysis_scores.json'
file_batch_size = 2000
max_files = 20
